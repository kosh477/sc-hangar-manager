<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SC Hangar Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='frontend.css') }}">
</head>
<body>
  <main class="container">
    <h1>SC Hangar Manager</h1>

    <section id="auth-screen" class="card">
      <h2>Авторизация</h2>
      <p class="muted">Войдите в систему, чтобы открыть каталог своих кораблей.</p>
      <div class="row">
        <input id="login" placeholder="Логин">
        <input id="password" type="password" placeholder="Пароль">
      </div>
      <div class="row">
        <button id="login-btn">Войти</button>
      </div>
      <p class="muted">Нет аккаунта? <a id="open-register-link" href="#register">Перейти к регистрации</a></p>
      <p id="auth-status" class="muted">Не авторизован</p>
    </section>

    <section id="register-screen" class="card hidden">
      <h2>Регистрация</h2>
      <div class="row">
        <input id="reg-name" placeholder="Имя">
        <input id="reg-email" placeholder="Email">
      </div>
      <div class="row">
        <input id="reg-login" placeholder="Логин">
        <input id="reg-password" type="password" placeholder="Пароль">
      </div>
      <div class="row">
        <button id="register-btn">Зарегистрироваться</button>
      </div>
      <p class="muted">Уже есть аккаунт? <a id="open-login-link" href="#login">Вернуться ко входу</a></p>
    </section>

    <section id="ships-screen" class="card hidden">
      <h2>Каталог моих кораблей</h2>
      <div class="row">
        <button id="reload-ships-btn">Обновить каталог</button>
        <button id="logout-btn" class="secondary">Выйти</button>
      </div>
      <ul id="my-data"></ul>
    </section>
  </main>

  <script src="{{ url_for('static', filename='frontend.js') }}" defer></script>
</body>
</html>
